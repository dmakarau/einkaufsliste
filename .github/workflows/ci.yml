name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate Hive adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Regenerate l10n
        run: flutter gen-l10n

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib/

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android (debug APK)
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate Hive adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Regenerate l10n
        run: flutter gen-l10n

      - name: Write .dart_defines
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'placeholder' }}
        run: |
          echo "{\"SUPABASE_URL\":\"$SUPABASE_URL\",\"SUPABASE_ANON_KEY\":\"$SUPABASE_ANON_KEY\"}" > .dart_defines

      - name: Build debug APK
        run: flutter build apk --debug --dart-define-from-file=.dart_defines

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate Hive adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Regenerate l10n
        run: flutter gen-l10n

      - name: Build web
        run: flutter build web --dart-define=SUPABASE_URL=https://placeholder.supabase.co --dart-define=SUPABASE_ANON_KEY=placeholder
