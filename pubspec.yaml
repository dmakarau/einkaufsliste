name: shopping_list
description: "Einkaufsliste — A German shopping list app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  hive_flutter: ^1.1.0
  go_router: ^14.2.0
  uuid: ^4.4.0
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.8.4
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/products/
